name: clang-tidy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-tidy \
          libasound2-dev \
          libudev-dev \
          qt6-base-dev \
          qt6-multimedia-dev

    - name: Configure CMake
      # Export compile_commands.json so clang-tidy knows each file's flags.
      run: cmake -B ${{github.workspace}}/build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Build dependencies
      # Build everything first so Catch2's generated headers and Qt's AUTOMOC
      # output exist before clang-tidy parses our translation units.
      run: cmake --build ${{github.workspace}}/build

    - name: Run clang-tidy
      # Lint only our own sources, not third_party/ or the fetched _deps/.
      #
      # Findings are reported but do not fail the job yet, so the linter can be
      # introduced without blocking merges on pre-existing issues. Once the
      # reported findings are addressed, add `-warnings-as-errors='*'` below to
      # make clang-tidy gate the build.
      run: |
        run-clang-tidy \
          -p ${{github.workspace}}/build \
          "$(pwd)/src/.*" \
          "$(pwd)/tools/.*" \
          "$(pwd)/tests/.*"
