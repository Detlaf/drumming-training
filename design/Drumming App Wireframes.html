<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drumming App — Wireframes</title>
<style>
  :root {
    --ink:    #1c1c1e;
    --ink-2:  #6b6b70;
    --ink-3:  #a3a3a8;
    --bg:     #ffffff;
    --bg-2:   #f7f7f8;
    --bg-3:   #f0f0f1;
    --line:   #e6e6e8;
    --hair:   #ededee;
    --staff:  #1c1c1e;
    --accent: oklch(0.55 0.15 252);
    --accent-soft: oklch(0.55 0.15 252 / 0.10);
    --good:   oklch(0.60 0.12 150);
    --warn:   oklch(0.74 0.12 78);
    --bad:    oklch(0.60 0.17 25);
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Helvetica Neue", Arial, sans-serif;
    --mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    color: var(--ink);
    background: #e8e8ea;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- macOS window shell ---------- */
  .mac-win {
    width: 100%;
    height: 100%;
    background: var(--bg);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    border: 1px solid var(--line);
  }
  .mac-titlebar {
    height: 40px;
    flex: 0 0 40px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    border-bottom: 1px solid var(--hair);
    background: var(--bg-2);
    position: relative;
  }
  .traffic { display: flex; gap: 8px; align-items: center; }
  .traffic i { width: 12px; height: 12px; border-radius: 50%; display: block; }
  .traffic .r { background: #ff5f57; }
  .traffic .y { background: #febc2e; }
  .traffic .g { background: #28c840; }
  .mac-wintitle {
    position: absolute; left: 0; right: 0; text-align: center;
    font-size: 13px; font-weight: 600; color: var(--ink-2);
    pointer-events: none;
  }
  .mac-body { flex: 1; display: flex; min-height: 0; }

  /* ---------- sidebar ---------- */
  .sidebar {
    width: 210px; flex: 0 0 210px;
    background: var(--bg-2);
    border-right: 1px solid var(--hair);
    display: flex; flex-direction: column;
    padding: 14px 12px;
  }
  .sb-brand {
    display: flex; align-items: center; gap: 9px;
    padding: 4px 8px 14px;
  }
  .sb-brand .mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--ink); color: #fff;
    display: grid; place-items: center; flex: 0 0 26px;
  }
  .sb-brand .name { font-size: 14px; font-weight: 650; letter-spacing: -0.01em; }
  .sb-section { font-size: 11px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 8px 6px; }
  .sb-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 8px; border-radius: 7px;
    font-size: 13.5px; color: var(--ink-2); cursor: default;
    font-weight: 500;
  }
  .sb-item .ico { color: var(--ink-3); display: grid; place-items: center; }
  .sb-item.active { background: var(--bg); color: var(--ink); box-shadow: 0 0 0 1px var(--line); font-weight: 600; }
  .sb-item.active .ico { color: var(--ink); }
  .sb-spacer { flex: 1; }
  .sb-status {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 10px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--bg);
    font-size: 12px; color: var(--ink-2);
  }
  .sb-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); }

  /* ---------- content ---------- */
  .content { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg); }
  .content-head {
    height: 56px; flex: 0 0 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 26px; border-bottom: 1px solid var(--hair);
  }
  .content-head h1 { font-size: 18px; font-weight: 650; margin: 0; letter-spacing: -0.01em; }
  .content-head .sub { font-size: 12.5px; color: var(--ink-3); margin-top: 1px; }
  .content-body { flex: 1; min-height: 0; padding: 26px; overflow: hidden; }

  /* ---------- generic atoms ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    height: 34px; padding: 0 14px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--bg);
    font-size: 13px; font-weight: 550; color: var(--ink); cursor: default;
    font-family: var(--font);
  }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.icon { width: 34px; padding: 0; justify-content: center; }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    height: 22px; padding: 0 9px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--bg);
    font-size: 11.5px; font-weight: 550; color: var(--ink-2);
  }
  .input {
    display: flex; align-items: center; gap: 8px;
    height: 36px; padding: 0 12px; border-radius: 9px;
    border: 1px solid var(--line); background: var(--bg);
    font-size: 13px; color: var(--ink-3);
  }
  .card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--bg); }
  .muted { color: var(--ink-2); }
  .faint { color: var(--ink-3); }
  .mono { font-family: var(--mono); }

  /* annotation note for wireframes */
  .wf-note {
    font-family: var(--mono); font-size: 11px; line-height: 1.45;
    color: var(--ink-3);
  }
  .seg {
    display: inline-flex; padding: 2px; border-radius: 8px;
    background: var(--bg-3); border: 1px solid var(--line); gap: 2px;
  }
  .seg button {
    border: 0; background: transparent; font-family: var(--font);
    font-size: 12.5px; font-weight: 550; color: var(--ink-2);
    height: 26px; padding: 0 11px; border-radius: 6px; cursor: default;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .seg button.on { background: var(--bg); color: var(--ink); box-shadow: 0 0 0 1px var(--line); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="components/shell.jsx"></script>
  <script type="text/babel" src="components/screens.jsx"></script>
  <script type="text/babel" src="components/play.jsx"></script>
  <script type="text/babel" src="components/editor.jsx"></script>
  <script type="text/babel" src="components/app.jsx"></script>
</body>
</html>
